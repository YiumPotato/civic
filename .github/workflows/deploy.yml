name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VPS_HOST: 46.101.104.158
  VPS_USER: root
  DEPLOY_DIR: /opt/civic

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: backend/go.sum

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend SPA
        run: cd frontend && npm run build

      - name: Embed frontend into backend
        run: |
          rm -rf backend/frontend_dist
          cp -r frontend/dist backend/frontend_dist
          rm -rf backend/prototype_dist
          cp -r "prototype ui/Kiro-Demo" backend/prototype_dist

      - name: Build Go binary (linux/amd64)
        run: |
          cd backend
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -o civic-server ./cmd/server
        env:
          CC: gcc

      - name: Deploy to VPS
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts

          SSH="ssh -i ~/.ssh/deploy_key $VPS_USER@$VPS_HOST"
          SCP="scp -i ~/.ssh/deploy_key"

          $SSH "mkdir -p $DEPLOY_DIR"
          $SCP backend/civic-server $VPS_USER@$VPS_HOST:$DEPLOY_DIR/civic-server.new
          $SSH "
            cd $DEPLOY_DIR &&
            mv civic-server.new civic-server &&
            chmod +x civic-server &&
            chown www-data:www-data civic-server &&
            systemctl restart civic
          "

      - name: Verify
        run: |
          sleep 3
          ssh -i ~/.ssh/deploy_key $VPS_USER@$VPS_HOST "systemctl is-active civic"
