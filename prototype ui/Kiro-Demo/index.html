<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Civic Coordination Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-gray-950 flex items-center justify-center min-h-screen">
  <!-- Phone shell -->
  <div id="phone" class="relative overflow-hidden shadow-2xl rounded-[2.5rem] border border-gray-700" style="width:375px;height:780px;background:#0a1628;">
    <!-- Screens -->
    <div id="screen-dashboard" class="screen active"></div>
    <div id="screen-map"       class="screen"></div>
    <div id="screen-tasks"     class="screen"></div>
    <div id="screen-alerts"    class="screen"></div>
    <div id="screen-checkin"   class="screen"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
